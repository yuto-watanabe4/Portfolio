<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>発注履歴一覧 - Restaurant Management</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 12px; text-align: left; }
    th { background-color: #f4f4f4; }
    .status-pending { color: #f57c00; font-weight: bold; } /* 発注中 */
    .status-completed { color: #388e3c; font-weight: bold; } /* 入荷済 */
    .back-link { display: block; margin-top: 20px; }
  </style>
</head>
<body>
<h1>📜 発注履歴一覧</h1>

<table>
  <thead>
  <tr>
    <th>発注日時</th>
    <th>食材名</th>
    <th>仕入先</th>
    <th>数量</th>
    <th>ステータス</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="order : ${orders}">
    <td th:text="${#temporals.format(order.orderedAt, 'yyyy/MM/dd HH:mm')}">2026/04/13 15:00</td>
    <td th:text="${order.item.itemName}">食材名</td>
    <td th:text="${order.vender != null ? order.vender.venderName : '未設定'}">仕入先</td>
    <td th:text="${order.orderQuantity}">0</td>
    <td>
                    <span th:text="${order.status}"
                          th:class="${order.status == 'PENDING' ? 'status-pending' : 'status-completed'}">
                        PENDING
                    </span>
    </td>
  </tr>
  </tbody>
</table>

<div class="back-link">
  <a th:href="@{/}">🏠 ダッシュボードへ戻る</a> |
  <a th:href="@{/items}">📦 在庫一覧へ</a>
</div>
</body>
</html>
