<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <title>発注食材確認 | 飲食店管理システム</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <h2 class="mb-4">発注食材確認</h2>

  <form th:action="@{/orders/complete}" method="post">
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <table class="table align-middle">
          <thead class="table-light">
          <tr>
            <th>食材名</th>
            <th>現在庫</th>
            <th>仕入先選択</th>
            <th style="width: 150px;">発注数量</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="item, stat : ${selectedItems}">
            <td>
              <span th:text="${item.itemName}" class="fw-bold"></span>
              <input type="hidden" name="itemIds" th:value="${item.itemId}">
            </td>
            <td th:text="${item.quantity}"></td>
            <td>
              <select name="vendorIds" class="form-select" required>
                <option value="">仕入先を選択...</option>
                <option th:each="vendor : ${vendors}"
                        th:value="${vendor.vendorId}"
                        th:text="${vendor.vendorName}"></option>
              </select>
            </td>
            <td>
              <div class="input-group">
                <input type="number" name="quantities" class="form-control"
                       value="1" min="1" required>
                <span class="input-group-text">個</span>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="d-flex justify-content-between">
      <button type="button" class="btn btn-secondary" onclick="history.back()">戻る</button>
      <button type="submit" class="btn btn-success btn-lg px-5">発注を確定する</button>
    </div>
  </form>
</div>
</body>
</html>
