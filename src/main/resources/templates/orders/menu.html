<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>食材発注画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h2 class="text-center mb-5">食材発注画面</h2>
    <div class="row justify-content-center g-4">
        <div class="col-md-5">
            <div class="card shadow-sm h-100 p-4 text-center">
                <h4>発注勧告</h4>
                <p class="text-muted small">在庫不足の食材を自動抽出します</p>
                <a th:href="@{/orders/alert}" class="btn btn-danger btn-lg mt-auto">発注勧告画面へ</a>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card shadow-sm h-100 p-4 text-center">
                <h4>通常発注</h4>
                <p class="text-muted small">全食材から手動で選択します</p>
                <a th:href="@{/orders/select}" class="btn btn-primary btn-lg mt-auto">発注食材選択へ</a>
            </div>
        </div>
    </div>
    <div class="text-center mt-5">
        <a th:href="@{/items}" class="btn btn-outline-secondary">在庫一覧に戻る</a>
    </div>
</div>
</body>
</html>
