<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>入出庫履歴 | 飲食店管理システム</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="#">在庫管理システム</a>
    <div class="navbar-nav">
      <a class="nav-link" th:href="@{/items}">在庫一覧</a>
      <a class="nav-link" th:href="@{/vendors}">仕入先管理</a>
      <a class="nav-link" th:href="@{/orders}">発注</a>
      <a class="nav-link active" th:href="@{/logs}">履歴</a>
    </div>
  </div>
</nav>

<div class="container">
  <h2 class="mb-4">入出庫・操作履歴</h2>
  <div class="card shadow-sm">
    <div class="card-body">
      <table class="table table-hover">
        <thead class="table-light">
        <tr>
          <th>日時</th>
          <th>食材ID</th>
          <th>操作</th>
          <th>数量</th>
          <th>操作者</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="log : ${logs}">
          <td th:text="${#temporals.format(log.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
          <td th:text="${log.itemId}"></td>
          <td>
                        <span th:text="${log.transactionType}"
                              th:classappend="${log.transactionType == '入庫' ? 'badge bg-success' : (log.transactionType == '出庫' ? 'badge bg-warning' : 'badge bg-secondary')}">
                        </span>
          </td>
          <td th:text="${log.quantity > 0 ? '+' + log.quantity : log.quantity}"></td>
          <td th:text="${'ユーザー' + log.userId}"></td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
