<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>入出庫入力</title>
</head>
<body>
<h1 th:text="${item.name} + ' の入出庫入力'">食材名 の入出庫入力</h1>
<p>現在の在庫: <span th:text="${item.quantity}">0</span> <span th:text="${item.unit}">kg</span></p>

<form th:action="@{/items/stock/update}" method="post">
  <input type="hidden" name="itemId" th:value="${item.id}">

  <div>
    <label>種別：</label>
    <select name="type">
      <option value="入庫">入庫 (+)</option>
      <option value="出庫">出庫 (-)</option>
      <option value="廃棄">廃棄 (-)</option>
    </select>
  </div>

  <div>
    <label>数量：</label>
    <input type="number" name="amount" min="1" required>
  </div>

  <button type="submit">確定する</button>
</form>
<br>
<a th:href="@{/items}">戻る</a>
</body>
</html>
