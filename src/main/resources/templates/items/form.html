<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>食材登録・編集</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 card shadow p-4">
      <h2 class="mb-4" th:text="${item.itemId == null} ? '新規食材登録' : '食材情報編集'"></h2>

      <form th:action="@{/items/save}" th:object="${item}" method="post">
        <input type="hidden" th:field="*{itemId}">

        <div class="mb-3">
          <label class="form-label">食材名</label>
          <input type="text" th:field="*{itemName}" class="form-control" required>
        </div>
        <div class="row">
          <div class="col mb-3">
            <label class="form-label">現在庫</label>
            <input type="number" th:field="*{quantity}" class="form-control" required>
          </div>
          <div class="col mb-3">
            <label class="form-label">発注点</label>
            <input type="number" th:field="*{reorderPoint}" class="form-control" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">単価 (円)</label>
          <input type="number" th:field="*{price}" class="form-control" required>
        </div>

        <div class="d-flex justify-content-between">
          <a th:href="@{/items}" class="btn btn-secondary">キャンセル</a>
          <button type="submit" class="btn btn-primary" th:text="${item.itemId == null} ? '登録する' : '更新する'"></button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
