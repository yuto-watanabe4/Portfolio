<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>アカウント編集</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
  <h2>アカウント編集</h2>

  <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

  <div class="card mt-4 shadow-sm">
    <div class="card-body p-4 bg-white rounded">
      <form th:action="@{/users/edit}" th:object="${user}" method="post">
        <input type="hidden" th:field="*{userId}">

        <div class="mb-3">
          <label class="form-label">ユーザー名</label>
          <input type="text" th:field="*{username}"
                 th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                 class="form-control">
          <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">パスワード (変更する場合のみ入力)</label>
          <input type="password" th:field="*{password}"
                 th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                 class="form-control" placeholder="新しいパスワード">
          <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label">権限</label>
          <select th:field="*{role}" class="form-select">
            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
          </select>
        </div>

        <form th:action="@{/users/edit}" th:object="${user}" method="post">
          <input type="hidden" th:field="*{userId}">

          <button type="submit" class="btn btn-primary">更新する</button>
          <a th:href="@{/users/list}" class="btn btn-secondary">戻る</a>
        </form>

      <div sec:authorize="hasRole('ADMIN')" class="mt-5 pt-4 border-top">
        <h5 class="text-danger">アカウントの削除</h5>
        <form th:action="@{/users/delete/{id}(id=*{userId})}" method="post"
              onsubmit="return confirm('本当に削除しますか？');">
          <button type="submit" class="btn btn-outline-danger btn-sm">このユーザーを完全に削除する</button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
