<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>ユーザー一覧 - 在庫管理システム</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>ユーザー管理一覧</h2>
    <a th:href="@{/users/register}" class="btn btn-primary">+ 新規アカウント作成</a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <table class="table table-hover">
        <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>ユーザー名</th>
          <th>権限</th>
          <th>作成日</th>
          <th class="text-center">操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
          <td th:text="${user.userId}">1</td>
          <td th:text="${user.username}">yuto</td>
          <td>
            <span th:text="${user.role}" th:classappend="${user.role.name() == 'ADMIN' ? 'badge bg-danger' : 'badge bg-secondary'}">ROLE
            </span>
          </td>
          <td th:text="${#temporals.format(user.createdAt, 'yyyy/MM/dd HH:mm')}">2026/04/17</td>
          <td class="text-center">
            <a th:href="@{/users/edit/{id}(id=${user.userId})}" class="btn btn-sm btn-outline-primary">編集</a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="mt-4">
    <a th:href="@{/items}" class="btn btn-secondary">在庫一覧に戻る</a>
  </div>
</div>
</body>
</html>
