<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>カテゴリ管理</title>
</head>
<body>
<h1>カテゴリ管理</h1>
<a th:href="@{/items}">在庫一覧へ戻る</a>

<h2>新規登録</h2>
<form th:action="@{/categories/register}" th:object="${category}" method="post">
  <input type="text" th:field="*{categoryName}" placeholder="カテゴリ名（例：野菜）" required>
  <button type="submit">登録</button>
</form>

<h2>カテゴリ一覧</h2>
<ul>
  <li th:each="cat : ${categories}">
    <span th:text="${cat.categoryName}">カテゴリ名</span>
  </li>
</ul>
</body>
</html>
