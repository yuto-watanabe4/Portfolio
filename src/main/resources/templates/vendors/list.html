<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>仕入先一覧 | 飲食店管理システム</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="#">在庫管理システム</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" th:href="@{/items}">在庫一覧</a></li>
        <li class="nav-item"><a class="nav-link active" th:href="@{/vendors}">仕入先管理</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/select}">発注</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>仕入先一覧</h2>
    <a th:href="@{/vendors/new}" class="btn btn-primary">+ 新規仕入先登録</a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <table class="table table-hover">
        <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>仕入先名</th>
          <th>電話番号</th>
          <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="vendor : ${vendors}">
          <td th:text="${vendor.vendorId}">1</td>
          <td th:text="${vendor.vendorName}">テスト食品</td>
          <td th:text="${vendor.phoneNumber}">03-0000-0000</td>
          <td>
            <a th:href="@{/vendors/edit/{id}(id=${vendor.vendorId})}" class="btn btn-sm btn-outline-secondary">編集</a>

            <form th:action="@{/vendors/delete/{id}(id=${vendor.vendorId})}" method="post" class="d-inline">
              <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('削除してよろしいですか？')">削除</button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
