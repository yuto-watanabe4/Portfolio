<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>仕入先登録・編集</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="card-title mb-4" th:text="${vendor.vendorId == null} ? '新規仕入先登録' : '仕入先情報編集'"></h3>

          <form th:action="@{/vendors/save}" th:object="${vendor}" method="post">
            <input type="hidden" th:field="*{vendorId}">

            <div class="mb-3">
              <label class="form-label">仕入先名</label>
              <input type="text" th:field="*{vendorName}" class="custom-control form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">電話番号</label>
              <input type="text" th:field="*{phoneNumber}" class="form-control" placeholder="03-1234-5678" required>
            </div>

            <div class="d-flex justify-content-between">
              <a th:href="@{/vendors}" class="btn btn-secondary">戻る</a>
              <button type="submit" class="btn btn-primary">保存する</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
